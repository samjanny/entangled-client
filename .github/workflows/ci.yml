name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# entangled-client depends on entangled-core (../entangled-api/entangled-core)
# and, since the GUI member, on entangled-engine (../entangled-engine), both as
# path dependencies relative to the workspace root. CI lays the repositories out
# as siblings so the paths resolve: this repo under entangled-client/, with
# entangled-api/ and entangled-engine/ alongside it.
jobs:
  test:
    name: Test ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta
    steps:
      - uses: actions/checkout@v4
        with:
          path: entangled-client
      - name: Checkout entangled-api (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-api
          path: entangled-api
      - name: Checkout entangled-engine (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-engine
          path: entangled-engine
      - name: Checkout spec corpus
        # Pinned in lockstep with entangled-core's SPEC_REVISION (the
        # entangled-api checkout above tracks it): the image conformance
        # harness asserts corpus.rc_target equals that constant, so a drift
        # fails CI loudly instead of skipping silently.
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled
          ref: v1.0-rc.56
          path: docs-spec
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: entangled-client
      - name: Build
        working-directory: entangled-client
        run: cargo build --workspace --all-targets --locked
      - name: Test
        working-directory: entangled-client
        run: cargo test --workspace --all-targets --locked

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: entangled-client
      # `cargo fmt --all` runs `cargo metadata`, which must resolve the
      # entangled-core path dependency, so the sibling repo is needed even here.
      - name: Checkout entangled-api (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-api
          path: entangled-api
      - name: Checkout entangled-engine (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-engine
          path: entangled-engine
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Rustfmt
        working-directory: entangled-client
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: entangled-client
      - name: Checkout entangled-api (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-api
          path: entangled-api
      - name: Checkout entangled-engine (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-engine
          path: entangled-engine
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: entangled-client
      - name: Clippy
        working-directory: entangled-client
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  doc:
    name: Doc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
        with:
          path: entangled-client
      - name: Checkout entangled-api (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-api
          path: entangled-api
      - name: Checkout entangled-engine (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-engine
          path: entangled-engine
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: entangled-client
      - name: Doc
        working-directory: entangled-client
        run: cargo doc --workspace --no-deps --locked

  purity:
    name: Purity guard (no I/O or toolkit in the brain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No std::net / std::fs / SystemTime / toolkit imports in entangled-client
        run: |
          if grep -rnE 'std::net|std::fs|SystemTime::now|\beframe\b|\begui\b|\breqwest\b|\btokio\b' \
              crates/entangled-client/src; then
            echo "::error::entangled-client must stay pure (no I/O or toolkit). See matches above."
            exit 1
          fi
          echo "purity guard passed"

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: entangled-client
      - name: Checkout entangled-api (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-api
          path: entangled-api
      - name: Checkout entangled-engine (path dependency)
        uses: actions/checkout@v4
        with:
          repository: samjanny/entangled-engine
          path: entangled-engine
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          workspaces: entangled-client
      - name: Build
        working-directory: entangled-client
        run: cargo build --workspace --all-targets --locked
